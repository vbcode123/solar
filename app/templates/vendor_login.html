{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendor Login - Suryaghar</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-navy: #0f172a;
            --secondary-navy: #1e293b;
            --gold-primary: #f59e0b;
            --gold-hover: #d97706;
            --bg-light: #f1f5f9;
            --text-main: #1e293b;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: 
                radial-gradient(at 0% 0%, rgba(245, 158, 11, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(15, 23, 42, 0.05) 0px, transparent 50%),
                linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 480px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.7);
            position: relative;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: linear-gradient(90deg, var(--gold-primary), #fbbf24);
        }

        .login-header {
            padding: 3rem 2rem 1.5rem;
            text-align: center;
        }

        .login-header img {
            height: 85px;
            margin-bottom: 1.5rem;
            filter: drop-shadow(0 10px 15px rgba(245, 158, 11, 0.2));
        }

        .login-header h2 {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 800;
            color: var(--primary-navy);
            margin-bottom: 0.5rem;
        }

        .login-body {
            padding: 0 3rem 3rem;
        }

        .form-label {
            font-weight: 700;
            font-size: 0.85rem;
            color: var(--primary-navy);
            margin-bottom: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-group {
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            transition: var(--transition);
            overflow: hidden;
        }

        .input-group:focus-within {
            border-color: var(--gold-primary);
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.1);
        }

        .input-group-text {
            background: transparent;
            border: none;
            color: #64748b;
            padding-left: 1.25rem;
        }

        .form-control {
            background: transparent;
            border: none;
            padding: 0.85rem 1.25rem 0.85rem 0.75rem;
            font-weight: 500;
            color: var(--primary-navy);
        }

        .form-control:focus {
            background: transparent;
            box-shadow: none;
            outline: none;
        }

        .btn-login {
            background: linear-gradient(135deg, var(--gold-primary) 0%, #fbbf24 100%);
            color: var(--primary-navy);
            border: none;
            padding: 1rem;
            border-radius: 16px;
            font-weight: 800;
            font-size: 1rem;
            width: 100%;
            margin-top: 1rem;
            transition: var(--transition);
            box-shadow: 0 10px 20px rgba(245, 158, 11, 0.2);
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(245, 158, 11, 0.3);
            background: linear-gradient(135deg, var(--gold-hover) 0%, var(--gold-primary) 100%);
        }

        .back-home {
            text-align: center;
            margin-top: 1.5rem;
        }

        .back-home a {
            color: #64748b;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .back-home a:hover {
            color: var(--gold-primary);
        }

        .alert {
            border-radius: 16px;
            border: none;
            font-weight: 600;
            margin-bottom: 2rem;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="login-header">
        <img src="{% static 'images/logo.png' %}" alt="Suryaghar Logo">
        <h2>Vendor Portal</h2>
        <p class="text-muted small">Installer Login - Access your installation projects</p>
    </div>

    <div class="login-body">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                    <i class="bi bi-exclamation-circle-fill me-2"></i> {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="mb-4">
                <label class="form-label">Phone Number</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-telephone-fill"></i></span>
                    <input type="text" name="phone" id="phone" class="form-control" placeholder="00000 00000" maxlength="11" required>
                </div>
            </div>
            
            <div class="mb-4">
                <label class="form-label">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="btn-login">
                Login to Dashboard
            </button>
        </form>

        <div class="back-home">
            <a href="{% url 'home' %}">
                <i class="bi bi-arrow-left"></i> Back to Homepage
            </a>
        </div>
    </div>
</div>

<!-- Bootstrap 5 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // Phone Number Formatting (5-5)
    const phoneInput = document.getElementById('phone');
    if (phoneInput) {
        phoneInput.addEventListener('input', function (e) {
            let x = e.target.value.replace(/\D/g, '').match(/(\d{0,5})(\d{0,5})/);
            if (x) {
                e.target.value = !x[2] ? x[1] : x[1] + ' ' + x[2];
            }
        });
    }
</script>
</body>
</html>
